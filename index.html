<html>
    <head>
        <title>Sản phẩm</title>
        <style>

        #header {
            background-color: #f8f7f7;
            color: rgb(10, 7, 7);
            text-align: right;
            display: flex;     
            white-space: nowrap;
            justify-content: space-between;
            padding-right: 40px;
            
        }
        
        #header #menutop{padding-top: 20px; }
        #menutop a {
            color: rgb(0, 0, 0);
            margin-left: 100px;
            text-decoration: none;
            gap: 100px;
            font-size: 18px;
            text-align: right;
            
        }

        #menutop a:hover {
            text-decoration: underline;
        }
        .banner{
            width: 100%;
            height: 300px;
            justify-content: center;
            display: grid;
            place-content: center;
            background-image: URL('images/banner2.png');
            background-size: cover; /* Lấp đầy không gian phần tử mà không làm biến dạng hình ảnh */
            background-position: center; /* Căn chỉnh hình ảnh vào giữa */
            background-repeat: no-repeat; /* Ngừng lặp lại hình ảnh */
        }
        .banner p{color: #ddd; 
            font-weight: bold;
            font-size: 50px;
        }
        .center{
            display: flex; 
            width: 100%;
            margin: 0;
            justify-content: center;

        }
        .left{
            width: 15%;
        }
        .right{
            
            width: 80%;
        }

        #h3{
            margin-top: 10px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
        }

        /* Định dạng cho danh sách */
        .left uL {
            list-style-type: none; /* Bỏ dấu chấm tròn trước mỗi mục */
            padding: 0;
            margin: 0;
        }

        /* Định dạng cho các mục trong danh sách */
        .left li {
            color: #c06804;
            font-weight: bold;
            font-size: 18px;
            padding: 10px;
            margin: 5px 0; /* Tạo khoảng cách giữa các mục */
            background-color: #fff; /* Màu nền cho các mục */
            border-bottom: #c06804 dotted 1px;
            transition: background-color 0.3s ease; /* Thêm hiệu ứng chuyển màu khi hover */
        }

        /* Định dạng khi hover lên các mục */
        .left li:hover {
            background-color: #ddd; /* Màu nền thay đổi khi hover */
            cursor: pointer; /* Thay đổi con trỏ thành hình tay khi hover */
        }


        
        .products {
            padding: 5px;
            text-align: center;
            background-color: #fff;
            display: flex;     
            white-space: nowrap;
            justify-content: center;
 
        }


        .item {
                display: inline-block;
                width: 20%;
                margin: 10px 2%;
                padding: 5px;
                background-color: #fafafa;
                text-align: center;
                border: 1px solid #ddd;
                border-radius: 10px;
                
            }
            .ads img:hover, .item:hover {
                border: #888686 solid 2px;
            }

            .ImgPro img {
                width: 100%;
                border-radius: 5px;
            }

            .Price {
                font-size: 20px;
                color: #333;
                margin-top: 10px;
            }

            button {
                background-color: #ffffff;
                border: #333 solid 2px;
                padding: 10px 20px;
                color: rgb(252, 6, 6);
                font-size: 16px;
                border-radius: 5px;
                cursor: pointer;
                margin-top: 6px;
                width: 100%;
            }

            button:hover {
                background-color: #ff8a00;
                border: #ffffff solid 2px;
                color: #ddd;
            }

        </style>
    </head>
    <body>
        <div id="header">
            <img src="images/logo.png" />

            <div id="menutop"> 
                <a href="">TRANG CHỦ</a>
                <a href="">GIỚI THIỆU </a>
                <a href="">SẢN PHẨM </a>
                <a href="">DỊCH VỤ</a>
                <a href="">LIÊN HỆ  </a>
            </div>
        </div>
        <div class="banner">
            <P>SẢN PHẨM</P>
        </div>
        <div class="center">
            <div class="left">
                <div id="h3"> DANH MỤC </div>
                <uL>
                    <LI>Cà phê</LI>
                    <li>Trái cây</li>
                    <li>Trà</li>
                    <li>Bánh</li>
                </uL>
            </div>
            <div class="right">
                <div id="h3"> SẢN PHẨM </div>
                <div class="products">
                    <div class="item">
                        <div class="ImgPro"><img src="images/banhmi.png"></div>
                        <div class="Price">$1000</div>
                        <button>Đặt hàng</button>
                    </div>
                    <div class="item">
                        <div class="ImgPro"><img src="images/caphe.png"></div>
                        <div class="Price">$1000</div>
                        <button>Đặt hàng</button>
                    </div>
                    <div class="item">
                        <div class="ImgPro"><img src="images/banh.png"></div>
                        <div class="Price">$1000</div>
                        <button>Đặt hàng</button>
                    </div>
                    <div class="item">
                        <div class="ImgPro"><img src="images/caphe2.png"></div>
                        <div class="Price">$1000</div>
                        <button>Đặt hàng</button>
                    </div>
                </div>

                <div class="products">
                    <div class="item">
                        <div class="ImgPro"><img src="images/caphe3.png"></div>
                        <div class="Price">$1000</div>
                        <button>Đặt hàng</button>
                    </div>
                    <div class="item">
                        <div class="ImgPro"><img src="images/caphe4.png"></div>
                        <div class="Price">$1000</div>
                        <button>Đặt hàng</button>
                    </div>
                    <div class="item">
                        <div class="ImgPro"><img src="images/caphe5.png"></div>
                        <div class="Price">$1000</div>
                        <button>Đặt hàng</button>
                    </div>
                    <div class="item">
                        <div class="ImgPro"><img src="images/caphe2.png"></div>
                        <div class="Price">$1000</div>
                        <button>Đặt hàng</button>
                    </div>
                </div>


            </div>
        </div>
    </body>
</html>
