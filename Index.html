        <style>
            .body {
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f4f4f4;
            }
            .top{
                padding-bottom: 10px;
            }

            .header {
                display: flex;
                justify-content: space-between;
                padding: 20px;
                background-color: #5f3107;
                color: #fff;
                padding-left: 200px;
                padding-right: 200px;

                
            }

            .banner {
                min-width: 100%;
                height: 350px;
            }

            .center{
                margin-left: 7px; margin-right: 7px;
            }

            .h3 {
                text-align: center;
                font-size: 28px;
                color: #6e0404;
                background-color: rgb(161, 126, 110);
                margin: 0;
            }

            .products {
                padding: 5px;
                text-align: center;
                background-color: #fff;
                display: flex;     
                white-space: nowrap;
                justify-content: center;

                
                
            }


            .ads{width: 42%;         }
            .ads img{
                display: inline-block;
                width: 100%;
                margin: 10px 2%;
                height: auto;
                border: 1px solid #ddd;
                border-radius: 10px;
            }


            .item {
                display: inline-block;
                width: 20%;
                margin: 10px 2%;
                padding: 5px;
                background-color: #fafafa;
                text-align: center;
                border: 1px solid #ddd;
                border-radius: 10px;
                
            }
            .ads img:hover, .item:hover {
                border: #888686 solid 2px;
            }

            .ImgPro img {
                width: 100%;
                
                border-radius: 5px;
            }

            .Price {
                font-size: 20px;
                color: #333;
                margin-top: 10px;
            }

            button {
                background-color: #ffffff;
                border: #333 solid 2px;
                padding: 10px 20px;
                color: rgb(252, 6, 6);
                font-size: 16px;
                border-radius: 5px;
                cursor: pointer;
                margin-top: 6px;
                width: 100%;
            }

            button:hover {
                background-color: #ff8a00;
                border: #ffffff solid 2px;
                color: #ddd;
            }

        </style>
